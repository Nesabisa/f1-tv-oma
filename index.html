<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#DC0000">
  <title>F1 im TV</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏎️</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --fr: #DC0000;
      --fd: #8B0000;
      --fb: #0a0a0a;
      --fc: #1C1C1C;
      --fg: #C9A227;
      --fw: #ffffff;
      --fgray: #aaa;
    }

    html, body {
      background: var(--fb);
      color: var(--fw);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
    }

    .app {
      max-width: 430px;
      margin: 0 auto;
      padding-bottom: 40px;
    }

    .hdr {
      background: var(--fr);
      padding: 20px 20px 16px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hdr::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(0,0,0,0.06) 40px, rgba(0,0,0,0.06) 41px);
    }
    .hdr-inner { position: relative; z-index: 1; }
    .hdr-horse { margin-bottom: 6px; }
    .hdr-title {
      font-family: 'Oswald', sans-serif;
      font-size: 30px;
      font-weight: 700;
      letter-spacing: 6px;
      text-transform: uppercase;
    }
    .hdr-sub {
      font-size: 12px;
      letter-spacing: 3px;
      opacity: 0.8;
      margin-top: 3px;
    }

    .stripe {
      height: 5px;
      background: linear-gradient(90deg, var(--fg) 0%, var(--fg) 33%, #fff 33%, #fff 66%, var(--fg) 66%);
    }

    .sec { padding: 20px 16px 6px; }
    .sec-label {
      font-family: 'Oswald', sans-serif;
      font-size: 11px;
      letter-spacing: 4px;
      color: var(--fg);
      text-transform: uppercase;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .live-card {
      background: var(--fr);
      border-radius: 16px;
      padding: 22px 20px;
      position: relative;
      overflow: hidden;
    }
    .live-card::after {
      content: '';
      position: absolute;
      right: -14px; top: -14px;
      width: 110px; height: 110px;
      background: rgba(0,0,0,0.12);
      border-radius: 50%;
    }
    .live-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .live-dot {
      width: 11px; height: 11px;
      background: #fff;
      border-radius: 50%;
      animation: blink 1.4s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.25; }
    }
    .live-badge-txt {
      font-family: 'Oswald', sans-serif;
      font-size: 15px;
      letter-spacing: 3px;
      opacity: 0.9;
    }
    .live-session {
      font-family: 'Oswald', sans-serif;
      font-size: 34px;
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 6px;
      position: relative;
      z-index: 1;
    }
    .live-race {
      font-size: 18px;
      opacity: 0.95;
      margin-bottom: 18px;
      line-height: 1.4;
    }
    .live-flag {
      font-size: 34px;
      position: absolute;
      right: 20px; top: 20px;
      opacity: 0.45;
      z-index: 0;
    }
    .live-chan {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(0,0,0,0.28);
      border-radius: 10px;
      padding: 12px 18px;
      font-family: 'Oswald', sans-serif;
      font-size: 22px;
      letter-spacing: 1px;
      position: relative;
      z-index: 1;
    }
    .live-chan-dot {
      width: 11px; height: 11px;
      background: #4ADE80;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .nothing {
      background: var(--fc);
      border-radius: 16px;
      padding: 36px 20px;
      text-align: center;
    }
    .nothing-ico { font-size: 52px; margin-bottom: 14px; }
    .nothing-txt {
      font-family: 'Oswald', sans-serif;
      font-size: 22px;
      color: var(--fgray);
    }

    .next-card {
      background: var(--fc);
      border-radius: 16px;
      padding: 22px 22px;
      border-left: 4px solid var(--fg);
    }
    .next-session {
      font-family: 'Oswald', sans-serif;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 5px;
    }
    .next-race {
      font-size: 16px;
      color: #bbb;
      margin-bottom: 14px;
      line-height: 1.4;
    }
    .next-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .next-ico { font-size: 18px; color: var(--fg); }
    .next-val {
      font-family: 'Oswald', sans-serif;
      font-size: 20px;
      color: var(--fg);
    }
    .next-chan { font-size: 17px; color: #ddd; margin-top: 4px; }
    .countdown {
      font-size: 15px;
      color: var(--fgray);
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #333;
    }
    .countdown span { color: #fff; font-weight: 600; }

    .sched-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 15px 0;
      border-bottom: 1px solid #222;
    }
    .sched-item:last-child { border-bottom: none; }
    .sched-flag { font-size: 28px; flex-shrink: 0; width: 36px; text-align: center; }
    .sched-info { flex: 1; min-width: 0; }
    .sched-session {
      font-family: 'Oswald', sans-serif;
      font-size: 19px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sched-race {
      font-size: 13px;
      color: var(--fgray);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }
    .sched-right { text-align: right; flex-shrink: 0; }
    .sched-date {
      font-family: 'Oswald', sans-serif;
      font-size: 16px;
      color: var(--fg);
    }
    .sched-time { font-size: 14px; color: var(--fgray); margin-top: 1px; }
    .sched-chan { font-size: 12px; color: #888; margin-top: 2px; }

    .season-item {
      border-bottom: 1px solid #1e1e1e;
    }
    .season-item:last-child { border-bottom: none; }
    .season-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 0;
      cursor: pointer;
      user-select: none;
    }
    .season-item.past .season-row { opacity: 0.4; }
    .season-item.current .season-row { opacity: 1; }
    .season-item.current { border-left: 3px solid var(--fr); padding-left: 12px; }
    .season-flag { font-size: 28px; flex-shrink: 0; width: 36px; text-align: center; }
    .season-info { flex: 1; min-width: 0; }
    .season-name {
      font-family: 'Oswald', sans-serif;
      font-size: 18px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .season-loc { font-size: 12px; color: var(--fgray); margin-top: 2px; }
    .season-right { text-align: right; flex-shrink: 0; }
    .season-date {
      font-family: 'Oswald', sans-serif;
      font-size: 15px;
      color: var(--fg);
    }
    .season-rnd { font-size: 11px; color: #666; margin-top: 2px; }
    .season-chevron {
      font-size: 14px;
      color: #555;
      flex-shrink: 0;
      transition: transform 0.2s;
    }
    .season-item.open .season-chevron { transform: rotate(90deg); color: var(--fg); }

    .season-sessions {
      display: none;
      background: #111;
      border-radius: 10px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .season-item.open .season-sessions { display: block; }
    .sess-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
      border-bottom: 1px solid #1a1a1a;
    }
    .sess-row:last-child { border-bottom: none; }
    .sess-row.past-sess { opacity: 0.4; }
    .sess-row.live-sess { background: rgba(220,0,0,0.15); }
    .sess-type {
      font-family: 'Oswald', sans-serif;
      font-size: 16px;
      font-weight: 500;
      width: 120px;
      flex-shrink: 0;
    }
    .sess-date { font-size: 13px; color: var(--fgray); flex: 1; }
    .sess-time {
      font-family: 'Oswald', sans-serif;
      font-size: 16px;
      color: var(--fg);
      flex-shrink: 0;
    }
    .sess-live-dot {
      width: 8px; height: 8px;
      background: var(--fr);
      border-radius: 50%;
      flex-shrink: 0;
      animation: blink 1.4s infinite;
    }

    .stand-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #222;
    }
    .stand-item:last-child { border-bottom: none; }
    .stand-pos {
      font-family: 'Oswald', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--fgray);
      width: 32px;
      text-align: center;
      flex-shrink: 0;
    }
    .stand-pos.p1 { color: #FFD700; }
    .stand-pos.p2 { color: #C0C0C0; }
    .stand-pos.p3 { color: #CD7F32; }
    .stand-info { flex: 1; min-width: 0; }
    .stand-name {
      font-family: 'Oswald', sans-serif;
      font-size: 20px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .stand-team {
      font-size: 13px;
      color: var(--fgray);
      margin-top: 2px;
    }
    .stand-right { text-align: right; flex-shrink: 0; }
    .stand-pts {
      font-family: 'Oswald', sans-serif;
      font-size: 20px;
      color: var(--fg);
    }
    .stand-pts-label { font-size: 11px; color: #666; }
    .stand-gap {
      font-family: 'Oswald', sans-serif;
      font-size: 16px;
      color: #bbb;
    }
    .stand-loading {
      text-align: center;
      padding: 20px;
      color: var(--fgray);
      font-size: 15px;
    }

    .update-time {
      text-align: center;
      font-size: 12px;
      color: #666;
      padding: 16px 0 0;
      letter-spacing: 1px;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      color: #666;
      padding: 8px 0 0;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
<div class="app">

  <div class="hdr">
    <div class="hdr-inner">
      <div class="hdr-horse">
        <svg width="50" height="50" viewBox="0 0 100 100" fill="white" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M62 8 C62 8 70 6 74 12 C78 18 72 24 68 26 C72 26 78 24 80 20 C82 16 80 10 76 8 C82 6 88 10 88 16 C88 24 80 30 72 30 L70 34 C74 36 78 42 76 50 C74 58 66 62 60 60 L58 72 C58 80 54 88 48 90 L44 90 C44 90 48 82 48 74 L46 74 C46 74 42 82 36 84 L32 84 C32 84 38 74 38 66 L36 68 C36 68 28 74 20 72 C12 70 8 62 10 54 C12 48 18 44 24 44 C20 42 14 38 12 32 C10 26 14 20 20 18 C26 16 34 20 36 26 C38 22 44 16 50 14 C54 12 58 10 62 8Z"/>
        </svg>
      </div>
      <div class="hdr-title">F1 im TV</div>
      <div class="hdr-sub">Formel 1 Programm</div>
    </div>
  </div>
  <div class="stripe"></div>

  <div class="sec">
    <div class="sec-label">&#9679; Jetzt im Fernsehen</div>
    <div id="live-content"></div>
  </div>

  <div class="sec">
    <div class="sec-label">&#8594; Als nächstes</div>
    <div id="next-content"></div>
  </div>

  <div class="sec" style="padding-bottom: 16px;">
    <div class="sec-label">&#128197; Nächste Termine</div>
    <div id="sched-content"></div>

  <div class="sec" style="padding-bottom: 16px;">
    <div class="sec-label" id="stand-label">&#127942; Fahrerwertung</div>

  </div>

  <div class="sec" style="padding-bottom: 16px;">
    <div class="sec-label">&#128197; Saisonkalender 2026</div>
    <div id="season-content"></div>
  </div>

  <div class="update-time" id="update-time"></div>
  <div class="footer">Scuderia Ferrari &middot; Formel 1 2026</div>

</div>

<script>
  const DAYS_DE   = ['So','Mo','Di','Mi','Do','Fr','Sa'];
  const MONTHS_DE = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];

  // ── Hilfsfunktionen ───────────────────────────────────────────────────
  function fmtDate(d){
    return DAYS_DE[d.getDay()]+', '+d.getDate()+'. '+MONTHS_DE[d.getMonth()];
  }
  function fmtTime(d){
    return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0')+' Uhr';
  }
  function fmtCountdown(ms){
    if(ms < 0) return '';
    const h = Math.floor(ms / 3600000);
    const m = Math.floor((ms % 3600000) / 60000);
    if(h >= 48){ return 'in '+Math.floor(h/24)+' Tagen'; }
    if(h >= 24){ const d=Math.floor(h/24); return 'in '+d+' Tag'+(d===1?'':'en'); }
    if(h > 0)  { return 'in '+h+' Std. '+m+' Min.'; }
    return 'in '+m+' Minute'+(m===1?'':'n');
  }

  // ── Ländercodes → Flaggen ─────────────────────────────────────────────
  const FLAGS = {
    BHR:'🇧🇭', SAU:'🇸🇦', AUS:'🇦🇺', JPN:'🇯🇵', CHN:'🇨🇳',
    USA:'🇺🇸', CAN:'🇨🇦', MCO:'🇲🇨', MON:'🇲🇨', ESP:'🇪🇸',
    AUT:'🇦🇹', GBR:'🇬🇧', BEL:'🇧🇪', HUN:'🇭🇺', NLD:'🇳🇱',
    ITA:'🇮🇹', AZE:'🇦🇿', SGP:'🇸🇬', MEX:'🇲🇽', BRA:'🇧🇷',
    QAT:'🇶🇦', UAE:'🇦🇪',
  };

  // ── API-Sessionname → Deutsch ─────────────────────────────────────────
  const SESSION_DE = {
    'Practice 1':'FP1', 'Practice 2':'FP2', 'Practice 3':'FP3',
    'Qualifying':'Qualifying', 'Race':'Rennen',
    'Sprint':'Sprint', 'Sprint Qualifying':'Sprintqualifying',
  };

  // ── Welche Sender zeigen welche Rennen? ───────────────────────────────
  const RTL_KEYWORDS = ['spain','spanish','brit','belgian','belgium','dutch','nether','italian','italy','brazil'];
  const ORF_KEYWORDS = ['austrian','austria','monaco','belgian','belgium','brit','dutch','nether','italian','italy'];

  function isRTL(meetingName, sessionName){
    const lower = meetingName.toLowerCase();
    return sessionName === 'Race' && RTL_KEYWORDS.some(n => lower.includes(n));
  }
  function isORF(meetingName, sessionName){
    const lower = meetingName.toLowerCase();
    return (sessionName === 'Race' || sessionName === 'Qualifying') && ORF_KEYWORDS.some(n => lower.includes(n));
  }
  function buildChan(rtl, orf){
    const parts = ['Sky Sport F1'];
    if(rtl) parts.push('RTL');
    if(orf) parts.push('ORF 1');
    return parts.join(' · ');
  }

  // ── API-Daten → internes Format ───────────────────────────────────────
  function apiToCalendar(sessions){
    const meetings = {};
    for(const s of sessions){
      const k = s.meeting_key;
      if(!meetings[k]) meetings[k] = {
        race: s.meeting_name,
        flag: FLAGS[s.country_code] || '🏁',
        sessions: [],
        sortKey: new Date(s.date_start).getTime(),
      };
      const start = new Date(s.date_start);
      const end   = new Date(s.date_end);
      const dur   = Math.round((end - start) / 60000);
      meetings[k].sessions.push({
        type:  SESSION_DE[s.session_name] || s.session_name,
        start, dur,
        sky:   true,
        rtl:   isRTL(s.meeting_name, s.session_name),
        orf:   isORF(s.meeting_name, s.session_name),
      });
    }
    return Object.values(meetings)
      .sort((a,b) => a.sortKey - b.sortKey)
      .map(m => {
        m.sessions.sort((a,b) => a.start - b.start);
        return m;
      });
  }

  // ── Fallback-Kalender (hardcoded) ─────────────────────────────────────
  function ldt(s){ return new Date(s); }

  const FALLBACK_CAL = [
    // ── Spanien (Barcelona) – 12.–14. Juni ──────────────────────────────

      {type:"FP2",       start:ldt("2026-06-12T18:00:00"), dur:60,  sky:true, rtl:false},
      {type:"FP3",       start:ldt("2026-06-13T13:30:00"), dur:60,  sky:true, rtl:false},

    // ── Österreich (Spielberg) – 26.–28. Juni ───────────────────────────
    {race:"Großer Preis von Österreich", flag:"🇦🇹", sessions:[
      {type:"FP1",       start:ldt("2026-06-26T13:30:00"), dur:60,  sky:true, rtl:false, orf:false},
      {type:"FP2",       start:ldt("2026-06-26T17:00:00"), dur:60,  sky:true, rtl:false, orf:false},
      {type:"FP3",       start:ldt("2026-06-27T12:30:00"), dur:60,  sky:true, rtl:false, orf:false},
      {type:"Qualifying",start:ldt("2026-06-27T16:00:00"), dur:60,  sky:true, rtl:false, orf:true},

    ]},
    // ── Großbritannien (Silverstone) – 3.–5. Juli  🏃 SPRINT ────────────
    {race:"Großer Preis von Großbritannien", flag:"🇬🇧", sessions:[
      {type:"FP1",            start:ldt("2026-07-03T14:30:00"), dur:60,  sky:true, rtl:false},
      {type:"Sprintqualifying",start:ldt("2026-07-03T18:30:00"), dur:45, sky:true, rtl:false},

    // ── Belgien (Spa) – 17.–19. Juli ────────────────────────────────────
    {race:"Großer Preis von Belgien", flag:"🇧🇪", sessions:[
      {type:"FP1",       start:ldt("2026-07-17T14:30:00"), dur:60,  sky:true, rtl:false},
      {type:"FP2",       start:ldt("2026-07-17T18:00:00"), dur:60,  sky:true, rtl:false},

    // ── Ungarn (Budapest) – 24.–26. Juli ────────────────────────────────
    {race:"Großer Preis von Ungarn", flag:"🇭🇺", sessions:[
      {type:"FP1",       start:ldt("2026-07-24T14:30:00"), dur:60,  sky:true, rtl:false},
      {type:"FP2",       start:ldt("2026-07-24T18:00:00"), dur:60,  sky:true, rtl:false},
      {type:"FP3",       start:ldt("2026-07-25T13:30:00"), dur:60,  sky:true, rtl:false},

    ]},
    // ── Niederlande (Zandvoort) – 21.–23. Aug  🏃 SPRINT ────────────────
    {race:"Großer Preis der Niederlande", flag:"🇳🇱", sessions:[
      {type:"FP1",            start:ldt("2026-08-21T13:30:00"), dur:60,  sky:true, rtl:false},
      {type:"Sprintqualifying",start:ldt("2026-08-21T17:30:00"), dur:45, sky:true, rtl:false},
      {type:"Sprint",         start:ldt("2026-08-22T12:00:00"), dur:30,  sky:true, rtl:false},
      {type:"Qualifying",     start:ldt("2026-08-22T16:00:00"), dur:60,  sky:true, rtl:false},
      {type:"Rennen",         start:ldt("2026-08-23T15:00:00"), dur:120, sky:true, rtl:true},
    ]},
    // ── Italien (Monza) – 4.–6. Sept ────────────────────────────────────
    {race:"Großer Preis von Italien", flag:"🇮🇹", sessions:[
      {type:"FP1",       start:ldt("2026-09-04T14:30:00"), dur:60,  sky:true, rtl:false},

  // ── Render ────────────────────────────────────────────────────────────
  function render(){
    const now = new Date();
    let liveItem = null, liveGp = null;
    let nextItem = null, nextGp = null;
    const upcoming = [];

    for(const gp of activeCal){
      for(const s of gp.sessions){
        const end = new Date(s.start.getTime() + s.dur * 60000);
        if(now >= s.start && now < end){
          liveItem = s; liveGp = gp;
        } else if(now < s.start){
          if(!nextItem){ nextItem = s; nextGp = gp; }
          upcoming.push({s, gp});
        }
      }
    }

    const liveEl = document.getElementById('live-content');
    if(liveItem){
      const chan = buildChan(liveItem.rtl, liveItem.orf);
      liveEl.innerHTML = `
        <div class="live-card">
          <div class="live-flag">${liveGp.flag}</div>
          <div class="live-badge">
            <div class="live-dot"></div>
            <span class="live-badge-txt">LIVE</span>
          </div>
          <div class="live-session">${liveItem.type}</div>
          <div class="live-race">${liveGp.race}</div>
          <div class="live-chan">
            <div class="live-chan-dot"></div>
            ${chan}
          </div>
        </div>`;
    } else {
      liveEl.innerHTML = `
        <div class="nothing">
          <div class="nothing-ico">🏁</div>
          <div class="nothing-txt">Gerade kein F1 im TV</div>
        </div>`;
    }

    const nextEl = document.getElementById('next-content');
    if(nextItem){
      const ms  = nextItem.start - now;
      const chan = buildChan(nextItem.rtl, nextItem.orf);
      nextEl.innerHTML = `
        <div class="next-card">
          <div class="next-session">${nextGp.flag} ${nextItem.type}</div>
          <div class="next-race">${nextGp.race}</div>
          <div class="next-row">
            <span class="next-ico">&#128197;</span>
            <span class="next-val">${fmtDate(nextItem.start)}</span>
          </div>
          <div class="next-row">
            <span class="next-ico">&#128336;</span>
            <span class="next-val">${fmtTime(nextItem.start)}</span>
          </div>
          <div class="next-chan">${chan}</div>
          <div class="countdown">Beginnt <span>${fmtCountdown(ms)}</span></div>
        </div>`;
    } else {
      nextEl.innerHTML = `<div class="nothing"><div class="nothing-txt">Saison 2026 beendet</div></div>`;
    }

    const schedEl = document.getElementById('sched-content');
    const show = upcoming.slice(1, 8);
    schedEl.innerHTML = show.map(({s, gp}) => {
      const chan = buildChan(s.rtl, s.orf);
      return `<div class="sched-item">
        <div class="sched-flag">${gp.flag}</div>
        <div class="sched-info">
          <div class="sched-session">${s.type}</div>
          <div class="sched-race">${gp.race}</div>
        </div>
        <div class="sched-right">
          <div class="sched-date">${fmtDate(s.start)}</div>
          <div class="sched-time">${fmtTime(s.start)}</div>
          <div class="sched-chan">${chan}</div>
        </div>
      </div>`;
    }).join('');

    document.getElementById('update-time').textContent = 'Stand: ' + fmtTime(now);
  }

  const CACHE_KEY = 'f1_sessions_v2';
  const CACHE_TTL = 6 * 60 * 60 * 1000; // 6 Stunden

  async function fetchFromAPI(){
    const res = await fetch('https://api.openf1.org/v1/sessions?year=2026');
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    if(!Array.isArray(data) || data.length === 0) throw new Error('Leere Antwort');
    return data;
  }

  async function loadCalendar(){
    // Cache prüfen
    try {
      const cached = JSON.parse(localStorage.getItem(CACHE_KEY) || 'null');
      if(cached && (Date.now() - cached.ts) < CACHE_TTL){
        activeCal = apiToCalendar(cached.data);
        render();
        return;
      }
    } catch(_){}

    // API abrufen
    try {
      const data = await fetchFromAPI();
      localStorage.setItem(CACHE_KEY, JSON.stringify({ts: Date.now(), data}));
      activeCal = apiToCalendar(data);
    } catch(err){
      console.warn('API nicht erreichbar, verwende Fallback-Kalender:', err.message);
      activeCal = FALLBACK_CAL;
    }
    render();
  }

  const STAND_CACHE_KEY = 'f1_standings_2026';
  const STAND_TTL = 12 * 60 * 60 * 1000; // 12 Stunden

  async function fetchStandings(){
    const res = await fetch('https://api.jolpi.ca/ergast/f1/2026/driverStandings.json');
    if(!res.ok) throw new Error('HTTP '+res.status);
    const json = await res.json();
    return json.MRData.StandingsTable.StandingsLists[0].DriverStandings;
  }

  // ── Live-Positionen (OpenF1, nur während Session) ─────────────────────
  async function fetchLivePositions(){
    const res = await fetch('https://api.openf1.org/v1/position?session_key=latest');
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    // Neuesten Eintrag pro Fahrer
    const latest = {};
    for(const d of data){
      if(!latest[d.driver_number] || d.date > latest[d.driver_number].date)
        latest[d.driver_number] = d;
    }
    // Fahrernamen nachladen
    const drRes = await fetch('https://api.openf1.org/v1/drivers?session_key=latest');
    const drivers = await drRes.json();
    const drMap = {};
    for(const d of drivers) drMap[d.driver_number] = d;
    return Object.values(latest)
      .sort((a,b) => a.position - b.position)
      .slice(0, 10)
      .map(p => ({
        pos: p.position,
        name: drMap[p.driver_number]
          ? drMap[p.driver_number].last_name
          : '#'+p.driver_number,
        team: drMap[p.driver_number]?.team_name || '',
        number: p.driver_number,
      }));
  }

  function renderStandings(list, isLive){
    const label = document.getElementById('stand-label');
    const el    = document.getElementById('stand-content');
    label.innerHTML = isLive
      ? '<span style="color:var(--fr)">&#9679;</span> Live-Positionen'
      : '&#127942; Fahrerwertung 2026';

    el.innerHTML = list.map((d,i) => {
      const posClass = i===0?'p1':i===1?'p2':i===2?'p3':'';
      const color = teamColor(d.team);
      const right = isLive
        ? `<div class="stand-gap">${d.gap||''}</div>`
        : `<div class="stand-pts">${d.pts}</div><div class="stand-pts-label">Punkte</div>`;
      return `<div class="stand-item">
        <div class="stand-pos ${posClass}">${d.pos}</div>
        <div style="width:4px;height:36px;border-radius:2px;background:${color};flex-shrink:0"></div>
        <div class="stand-info">
          <div class="stand-name">${d.name}</div>
          <div class="stand-team">${d.team}</div>
        </div>
        <div class="stand-right">${right}</div>
      </div>`;
    }).join('');
  }

  async function loadStandings(){
    // Erst aus Cache
    try {
      const c = JSON.parse(localStorage.getItem(STAND_CACHE_KEY)||'null');
      if(c && (Date.now()-c.ts) < STAND_TTL){
        renderStandings(c.data, false);
      }
    } catch(_){}

    // Wenn gerade eine Session live ist → live Positionen zeigen
    const now = new Date();
    let isLive = false;
    for(const gp of activeCal){
      for(const s of gp.sessions){
        const end = new Date(s.start.getTime() + s.dur*60000);
        if(now >= s.start && now < end){ isLive = true; break; }
      }
      if(isLive) break;
    }

    if(isLive){
      try {
        const live = await fetchLivePositions();
        renderStandings(live, true);
      } catch(_){
        // live nicht verfügbar → Wertung zeigen
        loadChampStandings();
      }
    } else {
      loadChampStandings();
    }
  }

  async function loadChampStandings(){
    try {
      const data = await fetchStandings();
      const list = data.map(d => ({
        pos: +d.position,
        name: d.Driver.familyName,
        team: d.Constructors[0]?.name || '',
        pts:  d.points,
      }));
      localStorage.setItem(STAND_CACHE_KEY, JSON.stringify({ts:Date.now(), data:list}));
      renderStandings(list, false);
    } catch(err){
      document.getElementById('stand-content').innerHTML =
        '<div class="stand-loading">Wertung nicht verfügbar</div>';
    }
  }

  function toggleRace(idx){
    const el = document.getElementById('race-'+idx);
    el.classList.toggle('open');
  }

  function renderSeason(){
    const now = new Date();
    const el  = document.getElementById('season-content');
    let autoOpen = -1;

    el.innerHTML = FULL_CAL.map((r, idx) => {
      const allDates  = r.sessions.map(s => s.dt);
      const start     = new Date(Math.min(...allDates));
      const lastDate  = new Date(Math.max(...allDates));
      const end       = new Date(lastDate.getTime() + 3*60*60*1000);
      const past      = now > end;
      const curr      = now >= start && now <= end;
      if(curr) autoOpen = idx;

      const d1 = start.getDate()+'. '+MONTHS_DE[start.getMonth()];
      const d2 = lastDate.getDate()+'. '+MONTHS_DE[lastDate.getMonth()];
      const dateStr = start.getMonth()===lastDate.getMonth()
        ? start.getDate()+'–'+lastDate.getDate()+'. '+MONTHS_DE[lastDate.getMonth()]
        : d1+' – '+d2;

      const sessHTML = r.sessions.map(s => {
        const isPast = now > new Date(s.dt.getTime() + 3*60*60*1000);
        const isLive = now >= s.dt && now < new Date(s.dt.getTime() + 3*60*60*1000);
        const chan   = buildChan(s.rtl, s.orf);
        return `<div class="sess-row${isPast?' past-sess':''}${isLive?' live-sess':''}">
          ${isLive ? '<div class="sess-live-dot"></div>' : ''}
          <div class="sess-type">${s.type}</div>
          <div class="sess-date">${DAYS_DE[s.dt.getDay()]}. ${fmtDate(s.dt).split(', ')[1]}</div>
          <div class="sess-time">${fmtTime(s.dt)}</div>
        </div>
        <div class="sess-row${isPast?' past-sess':''}${isLive?' live-sess':''}" style="padding-top:0;padding-bottom:10px;border-bottom:1px solid #1a1a1a">
          <div style="width:${isLive?'8px':'0'};flex-shrink:0"></div>
          <div class="sess-type" style="font-size:11px;color:#666;font-family:'Barlow',sans-serif;font-weight:400">${chan}</div>
        </div>`;
      }).join('');

      return `<div class="season-item${past?' past':''}${curr?' current':''}" id="race-${idx}">
        <div class="season-row" onclick="toggleRace(${idx})">
          <div class="season-flag">${r.flag}</div>
          <div class="season-info">
            <div class="season-name">${r.race}</div>
            <div class="season-loc">${r.loc}</div>
          </div>
          <div class="season-right">
            <div class="season-date">${dateStr}</div>
            <div class="season-rnd">Rennen ${r.rnd}</div>
          </div>
          <div class="season-chevron">&#9654;</div>
        </div>
        <div class="season-sessions">${sessHTML}</div>
      </div>`;
    }).join('');

    // Aktuelles Rennen automatisch aufklappen
    if(autoOpen >= 0){
      document.getElementById('race-'+autoOpen).classList.add('open');
    }
  }

  renderSeason(); // Live-Positionen jede Minute aktualisieren
</script>
